stages:
  - t: -750
    events:
      - {type: note, notes: "Pre-S1 dispersal: ten cratons and their terranes scattered over ~120 deg of the southern hemisphere, all converging. A girdle of subduction zones rings the assembling core; the previous cycle's interior basins are nearly consumed."}
    narrative: >
      The story opens mid-convergence. The ten cratons ride six shrinking
      plates toward a common center near 25S 0E, pulled by the slab girdle
      of the closing pre-cycle oceans. Active margins face inward on
      almost every block.
  - t: -700
    events:
      - {type: orogeny, class: ural, where: [-15, -10], blocks: [A, J, H, B], notes: "S1 western suture: the A-J group docks against H and the B-core margin. Today eroded to basement."}
      - {type: orogeny, class: ural, where: [-38, -35], blocks: [C, E, F], notes: "S1 southern suture: C-E-F belt docks. Today eroded to basement."}
    narrative: >
      First assembly collisions. The A-J group meets H along a
      north-south suture; the southern belt C-E-F docks soon after.
      These Ural-type orogens have had 700 Myr of erosion; today they
      survive only as basement structure inside the continents.
  - t: -650
    events:
      - {type: orogeny, class: ural, where: [-12, 42], blocks: [G, B, D], notes: "Final docking of G completes S1."}
      - {type: subduction_init, where: [-25, 95], notes: "Circum-S1 subduction girdle locks in: the extroversion engine. The exterior ocean (EXT) now rings the supercontinent."}
    narrative: >
      G arrives last and S1 is complete: every craton in one landmass
      centered near 25S, ringed by trenches dipping under its margins.
      Sea level falls; the interior dries into a vast continental
      climate. EXT, the world-ocean, surrounds everything.
  - t: -600
    events:
      - {type: note, notes: "S1 tenure. Thermal blanketing: mantle plumes incubate beneath the supercontinent; epeirogenic doming begins along the future rift lines."}
    narrative: >
      Quiet tenure. Heat trapped under the huge lid builds plume heads
      beneath the western flank and the C-D gap. The land bulges in
      broad domes; rivers radiate off them. The exterior margins remain
      active, slowly pulling at the lid from all sides.
  - t: -550
    events:
      - {type: LIP, where: [-15, -30], notes: "L1 flood basalts over the western-flank plume head: first magmatic precursor of breakup."}
    narrative: >
      The first Large Igneous Province (L1) erupts across the A-F
      neighborhood: kilometer-thick flood basalts over a few hundred
      thousand years. The crust beneath is weakened and primed to tear.
  - t: -500
    events:
      - {type: triple_junction, where: [-8, -14], notes: "R1 triple junction nucleates on the L1 scar between the A-flank and the H-B core."}
      - {type: failed_rift, where: [-8, -18], blocks: [A], notes: "AU1 aulacogen: the failed third arm runs into A; today a sediment-filled trough on AIJ's southeastern margin."}
      - {type: LIP, where: [-20, 8], notes: "L2 erupts at the R1 junction."}
    narrative: >
      Rifting begins. A three-armed rift (R1) opens on the old L1 scar;
      two arms link into a through-going rift between the western flank
      and the core, while the third arm fails and is preserved as
      aulacogen AU1 in A. L2 floods the junction as the lithosphere
      finally parts.
  - t: -450
    events:
      - {type: rift, where: [-15, -5], blocks: [A, I, J, F, E, C], notes: "R1 goes to seafloor spreading: breakup of S1."}
      - {type: ridge_birth, where: [-18, -8], notes: "Central Ridge born; CENTRAL ocean opens."}
      - {type: rift, where: [-32, 2], blocks: [H], notes: "H-B Seaway rift: H detaches westward from B - a small interior ocean."}
      - {type: LIP, where: [-40, 18], notes: "L3 floods the C-D gap as the southern arm unzips."}
      - {type: failed_rift, where: [-27, 8], blocks: [B], notes: "AU2 aulacogen on B's western margin."}
    narrative: >
      Breakup. The western flank (A, I, J, C, E, F and their terranes)
      tears away along the new Central Ridge; zig-zag rifted margins
      face the young CENTRAL ocean. H splits from B across the small
      H-B Seaway. S1 is dead after ~200 Myr of tenure.
  - t: -400
    events:
      - {type: rift, where: [-5, -42], blocks: [A, J, I, C, E, F], notes: "R3 splits the west flank: AJ-I group parts from C-E-F."}
      - {type: ridge_birth, where: [-8, -45], notes: "Western Ridge born; WESTERN ocean opens."}
      - {type: rift, where: [-2, 40], blocks: [G], notes: "G detaches northeast from the core."}
      - {type: ridge_birth, where: [2, 44], notes: "Northern Ridge born; NORTHERN ocean opens."}
      - {type: LIP, where: [0, -45], notes: "L4 erupts along the R3 axis."}
      - {type: subduction_init, where: [10, 120], notes: "EXT trenches advance: the exterior girdle begins consuming ocean ahead of the dispersing fragments (extroversion)."}
      - {type: failed_rift, where: [-12, 50], blocks: [G], notes: "AU3 aulacogen on G's trailing (southwestern) margin."}
    narrative: >
      Dispersal in earnest. The west flank itself splits along the
      Western Ridge: A-J-I head northwest, C-E-F southwest. G casts off
      toward the northeast across the new Northern Ocean. Four LIPs in
      100 Myr - L1 through L4 - have peppered the breakup, and a fifth
      is coming. The fragments now ride toward the trenches of EXT.
  - t: -350
    events:
      - {type: subduction_init, where: [12, -75], notes: "Ocean plate ahead of I founders; I's leading (western) margin turns Andean."}
      - {type: LIP, where: [-30, -60], notes: "L5: last breakup-series LIP, on the young WESTERN ocean floor; its plume survives today under plate ii (hotspot chain H2-H3-H12-H14)."}
    narrative: >
      The leading edges harden. Old exterior crust founders in new
      trenches ahead of I and the C-E-F group; coastal volcanic arcs
      rise. Behind them, passive margins quietly accumulate shelf
      sediment. L5 erupts at sea - the last gasp of the breakup plume
      family.
  - t: -300
    events:
      - {type: arc_accretion, where: [5, 62], blocks: [G], notes: "Offshore arcs dock onto G's northern leading margin - groundwork of the O4 belt."}
      - {type: note, notes: "Central Ridge reorganizes; long transform faults segment the CENTRAL ocean."}
    narrative: >
      G plows north, sweeping up island arcs along its leading edge.
      The CENTRAL ocean is now wide enough that its ridge breaks into
      long transform-offset segments. H drifts at its farthest from B;
      the H-B Seaway is at maximum width.
  - t: -250
    events:
      - {type: orogeny, class: laramide, where: [15, 70], blocks: [G], notes: "O4: the Northern Ridge's eastern limb subducts under G - flat-slab episode, broad interior uplift (today's 2.5 Mkm2 belt at 58N 79E, eroded to 1.15 km mean)."}
      - {type: reversal, where: [-35, 12], notes: "Subduction polarity in the H-B Seaway flips east: the seaway starts to close under B's margin."}
    narrative: >
      Fast-moving G overruns young, buoyant ridge crust: the slab goes
      flat and Laramide-style basement uplifts sweep 1300 km into G's
      interior - the O4 belt. Meanwhile the old H-B Seaway crust grows
      dense enough to founder; a new east-dipping trench under B begins
      pulling H home.
  - t: -200
    events:
      - {type: orogeny, class: himalayan, where: [15, -90], blocks: [A, I, J], notes: "O1: A and J converge on I; broad collision belt (3.2 Mkm2). AIJ is assembled and moves as one continent hereafter."}
      - {type: ridge_death, where: [8, -60], notes: "The A-I ridge segment is consumed in the collision."}
      - {type: subduction_jump, where: [20, -110], notes: "Subduction jumps outboard to AIJ's new western margin."}
      - {type: rift, where: [-12, 32], blocks: [micro_1], notes: "micro_1 detaches from B's northern margin and rides north."}
      - {type: orogeny, class: andean, where: [-45, -95], blocks: [C], notes: "O3: C's southwestern margin enters its sustained Andean phase (belt still active today)."}
    narrative: >
      The first great post-breakup collision: A and J close on I from
      two sides and weld into the continent AIJ along the broad O1
      belt - 700 km of stacked crust, 4 km peaks in its day. Subduction
      steps outboard to AIJ's Pacific-style western rim. Far south, C's
      seaward margin settles into the long Andean regime that still
      builds the O3 cordillera.
  - t: -150
    events:
      - {type: subduction_init, where: [-15, 25], notes: "CENTRAL ocean's eastern flank founders under BDH's western margin (today's T8 trench and B5 back-arc)."}
      - {type: subduction_init, where: [-50, -38], notes: "Southern ocean trench T5 system initiates."}
      - {type: note, notes: "H closes to within 1000 km of B; seaway crust nearly consumed."}
    narrative: >
      The CENTRAL ocean, now 300 Myr old at its eastern edge, begins to
      be consumed: a trench locks in along BDH's west coast. The planet
      is entering the early signs of the NEXT assembly even as the
      current oceans still widen elsewhere - exactly Earth's present
      condition.
  - t: -100
    events:
      - {type: orogeny, class: himalayan, where: [-40, 25], blocks: [B, D, H], notes: "O2: H docks against B and D; the seaway dies. Introverted Wilson cycle complete; BDH assembled (today 1.89 km mean, consistent with ~120 Myr age)."}
      - {type: ridge_death, where: [-36, 8], notes: "H-B Seaway ridge destroyed."}
      - {type: subduction_init, where: [0, -110], notes: "Intra-oceanic subduction starts in the WESTERN ocean: trench T2; the micro_7 arc begins building."}
      - {type: hotspot_track, where: [-35, -104], notes: "Plume P1 (L5 relic) under plate ii: chain H2-H3-H12-H14 starts recording plate motion."}
      - {type: hotspot_track, where: [-57, 35], notes: "Plume P2 under the southern ocean: chain H5-H6-H7-H10."}
      - {type: hotspot_track, where: [4, -7], notes: "Plume P3, equatorial CENTRAL ocean: H8-H9."}
      - {type: hotspot_track, where: [52, 8], notes: "Plume P4, northern ocean: H1-H11."}
      - {type: hotspot_track, where: [28, -90], notes: "Plume P5 under AIJ's old AU1 rift scar: continental hotspots H13-H15."}
    narrative: >
      H comes home: the seaway closes and the O2 belt rises across the
      B-D-H triple suture, completing the continent BDH almost exactly
      where its pieces stood in S1 - a textbook introverted Wilson
      cycle nested inside the larger extroversion. In the oceans, five
      mantle plumes light up the hotspot chains we can still trace.
  - t: -50
    events:
      - {type: orogeny, class: himalayan, where: [34, -130], blocks: [I], notes: "O5: ridge subduction plus arc pile-up on I's western margin; the belt is still rising (8.4 km peaks today)."}
      - {type: arc_accretion, where: [30, 110], blocks: [G, micro_4], notes: "O6: the micro_4 arc terrane docks onto G's eastern margin (2.3 km mean, ~30 Myr)."}
      - {type: subduction_init, where: [-27, -26], notes: "T10: a young trench breaks the CENTRAL ridge's western flank - subduction invading a young ocean."}
      - {type: orogeny, class: andean, where: [0, -112], blocks: [micro_7], notes: "O7: the micro_7 arc grows into a low orogen above trench T2 (still building)."}
    narrative: >
      The modern mountain age. AIJ's far western rim takes the full
      force of fast convergence - ridge crust subducts, arcs dock, and
      the O5 cordillera shoots past 8 km, the planet's highest ground.
      On the far side of the world micro_4 slams into G, raising O6.
      Even the young CENTRAL ocean now hosts a new trench: the long
      turn toward the next supercontinent has begun.
  - t: 0
    events:
      - {type: note, notes: "Present day. Active systems: trenches T1-T10, Andean margins on I, C and G, back-arcs B1-B7, hotspot chains from plumes P1-P5. AIJ, CEF and G converge broadly northward; BDH walks south alone. Projected next supercontinent: a boreal assembly of AIJ+CEF+G in ~200-300 Myr."}
    narrative: >
      Today the planet looks like Earth ~100 Myr after a breakup:
      four dispersed continents, half the coastline active, young
      interior sutures (O1, O2) wearing down while collision belts on
      the rims (O5, O6) still climb. The CENTRAL and WESTERN oceans
      are aging into their first trenches. The cycle is turning over.

