# Plate tectonic history of planet 06cy8w6z6a89kow6psje93 ("Orogen seed 10673275")
#
# One full supercontinent cycle, T-750 Myr to present, 50-Myr stages.
# Functional nomenclature: cratons A-J, microcontinents micro_1..micro_11,
# ocean PLATES i..xvi (present-day), named ocean BASINS below.
# Times in Myr (negative = before present). Block kinematics are keyframed
# paleo-centroids + spin; see lib/history_schema.py.
#
# Cycle style: mixed, predominantly EXTROVERSION. The supercontinent S1
# (all ten cratons, centered near 25S 0E) broke up at ~T-450; the western
# flank blocks (A,I,J + C,E,F) dispersed westward over the old exterior
# ocean, while the core blocks (B,D,H) stayed near home and ran a local
# introverted Wilson cycle (the H-B Seaway opened and closed again, O2).

meta:
  cycle_style: mixed (predominantly extroversion)
  supercontinent: S1 (ABCDEFGHIJ)
  assembled: -650
  breakup: -450
  t_present: 0

# Authored interpretation of each present-day orogen belt (from 25_inventory):
# the stage at which it last formed, and whether it is still tectonically
# active. The validator checks each inactive belt's present height against the
# erosion model (2500 m - 5 m/Myr x age); active belts are exempt.
orogen_ages:
  O1: {formed: -200, active: false, note: "AIJ assembly (himalayan), eroding"}
  O2: {formed: -100, active: false, note: "H-B seaway closure (himalayan), eroding"}
  O3: {formed: -200, active: true,  note: "sustained Andean margin on C"}
  O4: {formed: -250, active: false, note: "laramide flat-slab on G, eroding"}
  O5: {formed: -50,  active: true,  note: "active margin orogeny on I"}
  O6: {formed: -50,  active: true,  note: "young arc accretion on G"}
  O7: {formed: -50, active: true,  note: "active intra-oceanic arc (micro_7), built since subduction at T-100"}

oceans:
  - name: EXT (Exterior Ocean)
    born: null            # predates the cycle; the old world-ocean
    died: null
    note: >
      Eastern world basin. The basin is ancient but its crust is young:
      continuously renewed at exterior ridges and consumed at the T3/T4/T9
      trench cluster. Present plates xi, iii, xiv occupy it.
  - name: CENTRAL (Central Ocean)
    born: -450
    died: null
    note: Opened along rift R1 between the S1 west flank and the B-D-H core.
  - name: WESTERN (Western Ocean)
    born: -400
    died: null
    note: Opened along rift R3, splitting the west flank into AJ-I and C-E-F groups.
  - name: NORTHERN (Northern Ocean)
    born: -400
    died: null
    note: Opened when G detached northeast from the core.
  - name: HB (H-B Seaway)
    born: -450
    died: -100
    note: Introverted Wilson cycle; closed at the O2 collision.

